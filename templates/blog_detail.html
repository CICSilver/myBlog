{% extends 'base.html' %}
{% block title %}{{ blog.title }} - {{ site_name | default('Mole\'s Hole') }}{% endblock %}

{% block extra_head %}
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.1.0/github-markdown-light.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/atom-one-dark.min.css">
{% endblock %}

{% block content %}
  <div class="entry">
    <div class="navigation">
      <a class="navi-href" href="{{ url_for('main.index') }}">返回首页</a>
    </div>
    <div class="entry-header">{{ blog.title }}</div>
    <div class="markdown-container">
      <div class="entry-content markdown-body" id="markdown-preview"></div>
      <textarea id="markdown-content" style="display:none;">{{ blog.content | safe }}</textarea>
    </div>
    <p class="entry-footer">
      <span class="blog-footer">发表于 {{ blog.date }} {{ blog.time }}</span>
    </p>
  </div>
{% endblock %}

{% block extra_scripts %}
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/languages/javascript.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/languages/python.min.js"></script>
  <script>
    // marked + highlight 渲染
    marked.setOptions({
      highlight: function (code, lang) {
        if (lang && window.hljs && hljs.getLanguage(lang)) {
          return hljs.highlight(code, { language: lang }).value;
        }
        return window.hljs ? hljs.highlightAuto(code).value : code;
      }
    });
    const markdownContent = document.getElementById('markdown-content').value;
    document.getElementById('markdown-preview').innerHTML = marked.parse(markdownContent);
  </script>
  <style>
    .markdown-container pre {
      background-color: #1e1e1e;
      color: #d4d4d4;
      padding: 10px;
      border-radius: 8px;
      overflow-x: auto;
    }
  </style>
{% endblock %}
