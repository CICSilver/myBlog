{% extends "base.html" %}

{% block title %}页面不存在 | {{ site_name }}{% endblock %}
{% block body_class %}error-page{% endblock %}

{% block content %}
<section class="error-shell">
  <p class="section-label">Missing Archive</p>
  <div class="error-code">404</div>
  <h1>未找到相关页面</h1>
  <p>这条索引可能已经失效，或者它从一开始就没有被写进这份档案。</p>
  <a class="toolbar-button" href="{{ url_for('main.index') }}">返回首页</a>
</section>
{% endblock %}
