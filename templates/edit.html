<!DOCTYPE html>
<html>
    <head>
        <title>写日志</title>
        <!-- debug -->
        <link rel="stylesheet" type="text/css" href="../static/css/style.css">
        <!-- release -->
        <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='css/style.css') }}">

        <!-- editor.md -->
         <link rel="stylesheet" href="{{ url_for('static', filename='vendor/editor.md/css/editormd.min.css') }}" />
         <script src="https://apps.bdimg.com/libs/jquery/2.1.4/jquery.min.js"></script>
         <script src="{{ url_for('static', filename='vendor/editor.md/lib/marked.min.js') }}"></script>
         <script src="{{ url_for('static', filename='vendor/editor.md/lib/prettify.min.js') }}"></script>
         <script src="{{ url_for('static', filename='vendor/editor.md/editormd.js') }}"></script>
    </head>
    <body>
        <div class="container edit-containter">
            <div class="header">写日志</div>
            <div class="edit_container">
                <form method="POST" action="/edit">
                    <div class="edit_title">
                        <input class="writing_title_input" type="text" id="html-title" name="html-title" placeholder="HTML 标题" value="{{ blog.html_title if blog else ''}}" required autocomplete="off">
                        <input class="writing_title_input" type="text" id="title" name="title" placeholder="博客标题" value="{{ blog.title if blog else ''}}" required autocomplete="off">
                    </div>
                     <div id="markdown-editor" class="editormd">
                        <textarea style="display: none;" id="markdown-content" name="content"></textarea>
                     </div>
                    <input class="edit_confirm_btn grey_btn" type="submit" value="提交">
                </form>
            </div>
        <!-- Debug -->
        <script src="../static/js/scripts.js"></script>
        <!-- Release -->
        <script src="{{ url_for('static', filename='js/scripts.js') }}"></script>
        <script type="text/javascript">
            var editor = editormd("markdown-editor", {
                // 这里的尺寸必须在这里设置，设置样式会被 editormd 自动覆盖
                width: "900px",
                // 设置高度
                height: "500px",
                // 编辑器中初始内容
                markdown: {{ blog_content | tojson if blog_content else '""' | safe }},
                // 指定插件路径
                path: "{{ url_for('static', filename='vendor/editor.md/lib/') }}",
            });
        </script>
    </body>
</html>
