<!DOCTYPE html>
<html>
    <head>
        <title>写日志</title>
        <!-- debug -->
        <link rel="stylesheet" type="text/css" href="../static/css/style.css">
        <!-- release -->
        <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='css/style.css') }}">
    </head>
    <body>
        <div class="container">
            <div class="header">写日志</div>
            <div class="edit_container">
                <form method="POST" action="/edit">
                    <label class="writing_title_label" for="html-title">html标题:</label><br>
                    <input class="writing_title_input" type="text" id="html-title" name="html-title"><br><br>
                    <label class="writing_title_label" for="title">标题:</label><br>
                    <input class="writing_title_input" type="text" id="title" name="title"><br><br>
                    <label for="content">内容:</label><br>
                    <textarea class="writing_content_area" id="content" name="content" rows="20" cols="100"></textarea><br><br>
                    <input class="edit_confirm_btn grey_btn" type="submit" value="提交">
                </form>
            </div>
        <!-- Debug -->
        <script src="../static/js/scripts.js"></script>
        <!-- Release -->
        <script src="{{ url_for('static', filename='js/scripts.js') }}"></script>
    </body>
</html>
